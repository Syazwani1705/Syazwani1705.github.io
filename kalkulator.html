<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pastel Aesthetic Pro</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdf2f5;
            font-family: 'Varela Round', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 40px 20px;
        }

        /* ANIMASI BACKGROUND */
        .bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(120deg, #fce4ec, #e1f5fe, #fff9c4, #f3e5f5);
            background-size: 400% 400%;
            animation: gradientMove 12s infinite alternate ease-in-out;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wrapper {
            display: flex; flex-direction: column; align-items: center;
            position: relative; width: 100%;
        }

        .title-wrapper { margin-bottom: 20px; }
        .app-title {
            font-family: 'Fredoka', sans-serif; font-size: 1.1rem; color: white;
            background: #b5838d; padding: 10px 40px; border-radius: 50px;
            border: 4px solid white; box-shadow: 0 10px 25px rgba(181, 131, 141, 0.4);
            letter-spacing: 4px; animation: float 3s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* CONTAINER UTAMA */
        .container {
            position: relative;
            padding: 25px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            border: 2px solid rgba(255, 255, 255, 0.8);
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .calculator { width: 300px; transition: width 0.4s ease; }
        .scientific-mode .calculator { width: 500px; }

        /* LAYAR DISPLAY */
        .display-container {
            background: rgba(233, 237, 201, 0.8);
            padding: 15px 20px;
            border-radius: 25px;
            margin-bottom: 25px;
            border: 3px solid rgba(204, 213, 174, 0.4);
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.05);
        }
        #prev-op { 
            color: #8a9a5b; font-size: 0.9rem; min-height: 1.2rem; 
            text-align: right; font-family: 'Share Tech Mono', monospace;
            margin-bottom: 5px; opacity: 0.7;
        }
        #display { 
            width: 100%; background: none; border: none; color: #556b2f; 
            font-size: 2.3rem; text-align: right; outline: none; 
            font-family: 'Share Tech Mono', monospace;
        }

        /* TATA LETAK PANEL (PERBAIKAN DISINI) */
        .main-layout { 
            display: flex; 
            gap: 15px; 
            align-items: flex-start;
        }

        .scientific-panel { 
            display: none; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding-right: 15px;
            border-right: 2px dashed rgba(181, 131, 141, 0.2);
        }
        .scientific-mode .scientific-panel { display: grid; }

        .buttons { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            flex-grow: 1;
        }

        /* TOMBOL MENGAMBANG */
        button {
            height: 55px; width: 55px; border-radius: 50%; border: none;
            background: white; color: #6d6875; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 0 #e0e0e0, 0 8px 15px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
        }
        button:hover { transform: translateY(-4px); box-shadow: 0 9px 0 #e0e0e0, 0 12px 20px rgba(0,0,0,0.08); }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #e0e0e0; background: #f8f8f8 !important; }

        .operator { background: #faedcd; color: #b5838d; box-shadow: 0 5px 0 #e9d8a6; }
        .clear { background: #ffb4a2; color: white; box-shadow: 0 5px 0 #e5989b; }
        .mode-btn { background: #cdb4db; color: white; box-shadow: 0 5px 0 #b392ac; font-size: 0.7rem; }
        .equals { 
            background: #b5e48c; color: #4a7c44; 
            grid-column: span 4; width: 100%; border-radius: 30px; 
            box-shadow: 0 5px 0 #92c57c; font-size: 1.4rem;
        }

        /* RIWAYAT SLIDE */
        .history-toggle {
            position: absolute; right: -30px; top: 50%; transform: translateY(-50%);
            width: 35px; height: 75px; background: #b5838d; color: white;
            border-radius: 0 20px 20px 0; border: 3px solid white; border-left: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; z-index: 5;
        }

        .history-panel { 
            position: absolute; left: 100%; top: 20px; bottom: 20px;
            width: 0; opacity: 0; visibility: hidden;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px);
            border-radius: 0 35px 35px 0; border: 3px solid white; border-left: none;
            display: flex; flex-direction: column;
            transition: all 0.4s ease; z-index: 1; margin-left: -5px;
        }
        .history-panel.open { width: 230px; opacity: 1; visibility: visible; padding: 20px; }

        .history-item { padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.8); border-radius: 12px; border-left: 5px solid #b5e48c; font-size: 0.85rem; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .error-shake { animation: shake 0.15s ease-in-out 2; border-color: #ffb4a2 !important; }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>

    <div class="wrapper">
        <div class="title-wrapper"><h1 class="app-title">KALKULATOR</h1></div>
        
        <div class="container" id="calc-container">
            <div class="calculator">
                <div class="display-container" id="screen">
                    <div id="prev-op"></div>
                    <input type="text" id="display" value="0" readonly>
                </div>
                
                <div class="main-layout">
                    <!-- PANEL SCIENTIFIC (Kiri) -->
                    <div class="scientific-panel">
                        <button class="operator" onclick="appendSci('Math.sin')">sin</button>
                        <button class="operator" onclick="appendSci('Math.cos')">cos</button>
                        <button class="operator" onclick="appendSci('Math.tan')">tan</button>
                        <button class="operator" onclick="appendSci('Math.sqrt')">√</button>
                        <button class="operator" onclick="appendSci('Math.log')">ln</button>
                        <button class="operator" onclick="appendOp('**')">^</button>
                        <button class="operator" onclick="append('Math.PI')">π</button>
                        <button class="operator" onclick="append('Math.E')">e</button>
                    </div>

                    <!-- PANEL ANGKA (Kanan) -->
                    <div class="buttons">
                        <button class="mode-btn" onclick="toggleSci()">MODE</button>
                        <button class="operator" onclick="handleParenthesis()">( )</button>
                        <button class="operator" onclick="appendOp('%')">%</button>
                        <button class="clear" onclick="clearAll()">AC</button>
                        
                        <button onclick="append('7')">7</button><button onclick="append('8')">8</button><button onclick="append('9')">9</button>
                        <button class="operator" onclick="appendOp('/')">÷</button>
                        
                        <button onclick="append('4')">4</button><button onclick="append('5')">5</button><button onclick="append('6')">6</button>
                        <button class="operator" onclick="appendOp('*')">×</button>
                        
                        <button onclick="append('1')">1</button><button onclick="append('2')">2</button><button onclick="append('3')">3</button>
                        <button class="operator" onclick="appendOp('-')">−</button>
                        
                        <button onclick="append('0')">0</button><button onclick="append('.')">.</button>
                        <button class="operator" onclick="deleteLast()">⌫</button>
                        <button class="operator" onclick="appendOp('+')">+</button>
                        
                        <button class="equals" onclick="calculate()">=</button>
                    </div>
                </div>
            </div>

            <div class="history-toggle" id="hist-toggle" onclick="toggleHistory()">›</div>

            <div class="history-panel" id="hist-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span style="font-weight:bold; color:#b5838d; font-size:0.85rem;">RIWAYAT</span>
                    <button onclick="clearHistory()" style="height:auto; width:auto; padding:5px 10px; border-radius:10px; font-size:0.7rem; background:#ffb4a2; color:white; box-shadow:0 3px 0 #e5989b;">Hapus</button>
                </div>
                <ul id="history-list" class="history-list" style="list-style:none;"></ul>
            </div>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const prevOp = document.getElementById('prev-op');
        const histPanel = document.getElementById('hist-panel');
        const histToggle = document.getElementById('hist-toggle');
        const historyList = document.getElementById('history-list');
        const calcContainer = document.getElementById('calc-container');
        let currentInput = "";
        let isResultDisplayed = false;

        function triggerShake() {
            document.getElementById('screen').classList.add('error-shake');
            setTimeout(() => document.getElementById('screen').classList.remove('error-shake'), 300);
        }

        function append(char) {
            if (isResultDisplayed) { currentInput = ""; prevOp.innerText = ""; isResultDisplayed = false; }
            currentInput += char; updateDisplay();
        }

        function appendOp(op) {
            if (isResultDisplayed) isResultDisplayed = false;
            const lastChar = currentInput.slice(-1);
            if (currentInput === "" && op !== '-') { triggerShake(); return; }
            if (['+', '-', '*', '/', '%'].includes(lastChar)) { currentInput = currentInput.slice(0, -1) + op; } 
            else { currentInput += op; }
            updateDisplay();
        }

        function appendSci(func) {
            if (isResultDisplayed) { currentInput = ""; isResultDisplayed = false; }
            const lastChar = currentInput.slice(-1);
            if (!isNaN(lastChar) && lastChar !== "") currentInput += "*";
            currentInput += func + "("; updateDisplay();
        }

        function handleParenthesis() {
            const lastChar = currentInput.slice(-1);
            const openCount = (currentInput.match(/\(/g) || []).length;
            const closeCount = (currentInput.match(/\)/g) || []).length;
            if (openCount > closeCount && !isNaN(lastChar)) currentInput += ")";
            else { if (currentInput !== "" && !isNaN(lastChar)) currentInput += "*"; currentInput += "("; }
            updateDisplay();
        }

        function updateDisplay() {
            display.value = currentInput.replace(/\*\*/g, "^").replace(/\*/g, "×").replace(/\//g, "÷").replace(/Math\./g, "") || "0";
        }

        function calculate() {
            try {
                if (currentInput === "") return;
                // Fix perkalian angka negatif: (-3)+(-3)
                let evalStr = currentInput.replace(/([+\-*/%])(-)/g, '$1($2');
                const openCount = (evalStr.match(/\(/g) || []).length;
                const closeCount = (evalStr.match(/\)/g) || []).length;
                if (openCount > closeCount) evalStr += ")".repeat(openCount - closeCount);
                
                // Fix Implicit Multiplication: 10(2)
                evalStr = evalStr.replace(/(\d)(\()/g, '$1*$2').replace(/(\))(\d)/g, '$1*$2');

                let res = eval(evalStr);
                prevOp.innerText = display.value + " =";
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `<div>${display.value}</div><div style="font-weight:bold"> = ${res}</div>`;
                historyList.prepend(li);
                currentInput = res.toString();
                display.value = res;
                isResultDisplayed = true;
            } catch (e) { triggerShake(); display.value = "Error"; currentInput = ""; }
        }

        function toggleHistory() {
            histPanel.classList.toggle('open');
            histToggle.innerText = histPanel.classList.contains('open') ? '‹' : '›';
        }

        function toggleSci() {
            calcContainer.classList.toggle('scientific-mode');
        }

        function clearAll() { currentInput = ""; prevOp.innerText = ""; updateDisplay(); }
        function deleteLast() { currentInput = currentInput.slice(0, -1); updateDisplay(); }
        function clearHistory() { historyList.innerHTML = ""; }
    </script>
</body>
</html>
