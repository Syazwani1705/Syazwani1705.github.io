<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestasi</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--AOS ANIMATION -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">


    <style>
        body {
            font-family: "Inter", "Segoe UI", sans-serif;
            background: #f5f7fb;
            color: #1e293b;
        }

        /* ================= BODY ================= */
        body {
            font-family: "Inter", "Segoe UI", sans-serif;
            background: #f5f7fb;
            margin: 0;
            color: #1e293b;
        }

        /* ================= NAVBAR ================= */
        .navbar-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 18px 0;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-inner {
            width: 95%;
            max-width: 1200px;
            margin: auto;
            padding: 0 10px;
        }

        .navbar-box h4 {
            color: #1e293b;
            letter-spacing: 1px;
        }

        /* NAV LINK */
        .nav-underline .nav-link {
            color: #64748b;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-underline .nav-link:hover {
            color: #2563eb;
        }

        .nav-underline .nav-link.active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }

        /* FOOTER */
        footer {
            background: #0f172a;
            color: #cbd5f5;
        }

        #prestasi {
            background: linear-gradient(135deg, #e0e7ff, #f8fafc);
            padding: 80px 20px;
            border-radius: 20px;
            margin-top: 60px;
        }

        .prestasi-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        /* GLOW EFFECT */
        .prestasi-box::before {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            background: #2563eb;
            opacity: 0.1;
            border-radius: 50%;
            top: -50px;
            left: -50px;
        }

        /* HOVER */
        .prestasi-box:hover {
            transform: translateY(-8px) scale(1.02);
        }

        /* ICON */
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }

        /* TEXT */
        .kosong {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
        }

        h2 {
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar-box">
        <div
            class="navbar-inner d-flex justify-content-between align-items-center">
            <h4 class="fw-bold m-0">CV Digital</h4>

            <ul class="nav nav-underline">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Beranda</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="TentangSaya.html">Tentang</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Pendidikan.html">Pendidikan</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Pengalaman.html">Pengalaman</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="Prestasi.html">Prestasi</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Portofolio.html">Portofolio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Kemampuan.html">Kemampuan</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Kontak.html">Kontak</a>
                </li>
            </ul>
        </div>
    </div>

    <!-- CONTENT -->
    <section id="prestasi" class="container">

        <h2 class="text-center mb-5" data-aos="fade-down">
            Prestasi
        </h2>

        <div class="prestasi-box text-center" data-aos="zoom-in" data-aos-delay="200">

            <div class="icon" data-aos="fade-up" data-aos-delay="400">
                ⭐
            </div>

            <p class="kosong" data-aos="fade-up" data-aos-delay="600">
                Belum memiliki prestasi
            </p>

        </div>

    </section>

    <!-- FOOTER -->
    <footer
        class="text-center text-white py-3 mt-auto"
        style="background-color: #0f1f3d">
        © 2026 Syazwani | Let’s grow together.
    </footer>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>

</body>

</html>
