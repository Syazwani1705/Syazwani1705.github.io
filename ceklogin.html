<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Login Estetik Warna-Warni</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Latar belakang dengan gradasi lembut */
            background: linear-gradient(-45deg, #dfd3c3, #c7b198, #a68b6d, #8d6e63);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Elemen Gelembung */
        .bubbles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            bottom: -120px;
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
            filter: blur(2px); /* Membuat gelembung terlihat lebih lembut */
            opacity: 0.6;
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            30% { opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(720deg); opacity: 0; }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(93, 64, 55, 0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .login-card h2 { color: #5d4037; margin-bottom: 10px; font-size: 28px; }
        .login-card p { color: #8d6e63; font-size: 14px; margin-bottom: 30px; }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #5d4037;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            padding-right: 45px; 
            border: 2px solid #eee;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            background: rgba(250, 250, 250, 0.8);
        }

        .input-group input:focus { border-color: #a68b6d; background: #fff; }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #8d6e63;
            font-size: 18px;
            user-select: none;
        }

        button.btn-login {
            width: 100%;
            padding: 12px;
            background: #8d6e63;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button.btn-login:hover { background: #5d4037; transform: translateY(-2px); }

        /* Modal & Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 99;
        }

        #modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            z-index: 100;
            width: 300px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .btn-ok {
            background: #a68b6d;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            float: right;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Gelembung Warna-Warni Muted/Pastel -->
    <div class="bubbles">
        <!-- Creamy Yellow -->
        <div class="bubble" style="width: 80px; height: 80px; left: 10%; background: #f3e5ab; animation-duration: 8s;"></div>
        <!-- Soft Terracotta -->
        <div class="bubble" style="width: 100px; height: 100px; left: 30%; background: #eab676; animation-duration: 12s; animation-delay: 1s;"></div>
        <!-- Muted Sage -->
        <div class="bubble" style="width: 120px; height: 120px; left: 55%; background: #b2ac88; animation-duration: 10s; animation-delay: 3s;"></div>
        <!-- Dusty Rose -->
        <div class="bubble" style="width: 70px; height: 70px; left: 80%; background: #d4a5a5; animation-duration: 14s; animation-delay: 2s;"></div>
        <!-- Peach -->
        <div class="bubble" style="width: 50px; height: 50px; left: 45%; background: #fbc4ab; animation-duration: 9s; animation-delay: 5s;"></div>
        <!-- Sand -->
        <div class="bubble" style="width: 90px; height: 90px; left: 90%; background: #e3d5ca; animation-duration: 11s; animation-delay: 4s;"></div>
    </div>

    <!-- Form Login -->
    <div class="login-card">
        <h2>Form Login</h2>
        <p>Silahkan masuk ke akun Anda!</p>
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Masukkan username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password">
            <span class="toggle-password" id="toggleBtn" onclick="togglePass()">👁️</span>
        </div>

        <button class="btn-login" onclick="cekLogin()">LOGIN</button>
    </div>

    <div id="overlay"></div>
    <div id="modal">
        <h3 id="statusTitle">Info</h3>
        <p id="pesan"></p>
        <div style="overflow: hidden; width: 100%;">
            <button class="btn-ok" onclick="tutupModal()">OK</button>
        </div>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('password');
            const toggleBtn = document.getElementById('toggleBtn');
            if (passInput.type === "password") {
                passInput.type = "text";
                toggleBtn.innerText = "🙈"; 
            } else {
                passInput.type = "password";
                toggleBtn.innerText = "👁️"; 
            }
        }

        function cekLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const modal = document.getElementById('modal');
            const overlay = document.getElementById('overlay');
            const pesan = document.getElementById('pesan');
            const title = document.getElementById('statusTitle');

            if (user === "" && pass === "") {
                title.innerText = "Peringatan";
                title.style.color = "#e67e22";
                pesan.innerHTML = "Username dan Password <b>wajib diisi!</b>";
            } 
            else if (user === "") {
                title.innerText = "Peringatan";
                title.style.color = "#e67e22";
                pesan.innerHTML = "Username <b>wajib diisi!<b>";
            } 
            else if (pass === "") {
                title.innerText = "Peringatan";
                title.style.color = "#e67e22";
                pesan.innerHTML = "Password <b>wajib diisi!<b>";
            } 
            else {
                if (user === "Aini" && pass === "12345") {
                    title.innerText = "Login Berhasil!";
                    title.style.color = "#2ecc71";
                    pesan.innerHTML = "Selamat datang kembali, Aini!";
                } else {
                    title.innerText = "Login Gagal!";
                    title.style.color = "#e74c3c";
                    pesan.innerHTML = "Username atau password-mu salah.";
                }
            }
            
            modal.style.display = 'block';
            overlay.style.display = 'block';
        }

        function tutupModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
